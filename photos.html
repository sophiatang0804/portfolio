<!DOCTYPE html>
<html lang="us-en">
<head>
	<meta charset="utf-8">
	<title>Sophia Tang's Portfolio</title>
	<style type="text/css">
		*{
			margin: 0;
			padding: 0;
		}

		body {
			font-size: 16px;
			color: #000;
			font-family:'SourceSansPro-Regular', helvetica;
			width: 100%;
			max-width: 1440px;
			margin: 0 auto;
		}

		.header {
			position: fixed;
			z-index: 9999;
			width: 100%;
			max-width: 1440px;
			height: 100px;
			background-color: #fff;
			opacity: 0.9;
			display: flex;
			justify-content: space-between;
		}

		.header .logo {
			font-family: 'SourceSansPro-Bold', helvetica;
			line-height: 100px;
			padding-left: 140px;
		}

		.header .logo a{
			text-decoration: none;
			color: #000;
		}

		.header img {
			display: none;
		}

		.header ul {
			list-style-type: none;
			padding-right: 140px;
		}

		.header ul li {
			display: inline-block;
			height: 100px;
			line-height: 100px;
			padding-left: 40px;
		}

		.header ul li:nth-child(2) a {
			color: #000;
			border-bottom: 3px solid #000;
		}

		.header ul li a {
			color: #555;
			text-decoration: none;
			font-family: 'SourceSansPro-Regular';
			display: inline-block;
			height: 70px;
		}

		.header ul li a:hover {
			color: #000;
		}

		.content {
			width: 100%;
			background-color: #fff;
		}

		.content .works {
			width: 1160px;
			display: flex;
			justify-content: space-between;
			flex-wrap: wrap;
			margin: 0 auto;
			padding: 160px 0 60px 0;
		}

		.content .works .work {
			width: 360px;
			height: 360px;
			margin-bottom: 40px;
			position: relative;
			background-size: cover;
		}

		.work .img-cover{
			width: 100%;
			height: 100%;
		}

		.work:hover .img-cover {
			background: #fff;
			box-shadow: #8C9bA5 0 0 20px 2px;
			opacity: 0.8;
			transition: all, 1s;
		}

		.work .work-name {
			width: 100%;
			height: 100%;
			line-height: 360px;
			text-align: center;
			position: absolute;
			top: 0;
			left: 0;
			font-size: 36px;
			color: #555;
			font-family: 'SourceSansPro-Regular';
			opacity: 0;
		}

		.work .work-year {
			width: 100%;
			height: 100%;
			line-height: 480px;
			text-align: center;
			position: absolute;
			top: 0;
			left: 0;
			font-size: 32px;
			color: #555;
			font-family: 'SourceSansPro-Light';
			opacity: 0;
		}

		.work:hover .work-name {
			opacity: 1;
		}

		.work:hover .work-year {
			opacity: 1;
		}

		.works .work1 {
			background: url(./images/pic1.jpg) no-repeat;
		}

		.works .work2 {
			background: url(./images/pic2.jpg) no-repeat;
		}

		.works .work3 {
			background: url(./images/pic3.jpg) no-repeat;
		}

		.works .work4 {
			background: url(./images/pic4.jpg) no-repeat;
		}

		.works .work5 {
			background: url(./images/pic5.jpg) no-repeat;
		}

		.works .work6 {
			background: url(./images/pic6.jpg) no-repeat;
		}

		.works .work7 {
			background: url(./images/pic7.jpg) no-repeat;
		}

		.works .work8 {
			background: url(./images/pic8.jpg) no-repeat;
		}

		.works .work9 {
			background: url(./images/pic9.jpg) no-repeat;
		}

		.back-to-top {
			position: fixed;
			width:70px;
			height: 70px;
			border-radius: 35px;
			background: #f5f7fa;
			margin: 0 auto;
			color: #000;
			text-align: center;
			line-height: 20px;
			bottom: 200px;
			left: calc(50% - 35px);
			opacity: 0;
    		transition: all 1s;
		}

		.back-to-top-show {
			opacity: 1;
		}

		.back-to-top img {
			margin-top: 20px;
		}

		.footer {
			width: 100%;
			height: 100px;
			display: flex;
			flex-direction: row-reverse;
			justify-content: space-between;
		}

		.footer p {
			color: #000;
			font-size: 14px;
			text-align: center;
			line-height: 100px;
			padding-left: 140px;
		}

		.footer .social-media {
			width: 240px;
			display: flex;
			justify-content: space-between;
			margin: 0 auto;
			margin-right: 140px;
		}

		.footer .social-media img {
			padding-top: 34px;
			width: 32px;
			height: 32px;
			opacity: 1;
		}

		.footer .social-media img:hover {
			opacity: 0.6;
		}

		@media screen and (min-width: 1200px) and (max-width: 1439px) {
			.content .works {
				width: 1100px;
			}
			.content .works .work {
				width: 340px;
				height: 340px;
			}
		}

		@media screen and (min-width: 992px) and (max-width: 1199px) {

			.content .works {
				width: 920px;
			}
			.content .works .work {
				width: 280px;
				height: 280px;
			}
		}

		@media screen and (min-width: 768px) and (max-width: 991px) {
			.content .works {
				width: 680px;
			}

			.content .works .work {
				width: 320px;
				height: 320px;
			}
		}

		@media screen and (min-width: 414px) and (max-width: 767px) {
			.header .logo {
				padding-left: 10%;
			}

			.header ul {
				display: none;
			}

			.header img {
				position: absolute;
				top: 39.5px;
				right: 10%;
				width: 30px;
				height: 21px;
				display: block;
			}

			.content .works {
				width: 350px;
			}

			.content .works .work {
				width: 350px;
				height: 350px;
			}

			.work .work-name {
				line-height: 350px;
				font-size: 36px;
			}

			.work .work-year {
				line-height: 440px;
			}

			.footer {
				display: block;
			}

			.footer p {
				padding-left: 0;
				line-height: 60px;
			}

			.footer .social-media {
				margin: 0 auto;
			}
		}

		@media screen and (min-width: 320px) and ( max-width: 413px) {
			.header .logo {
				padding-left: 10%;
			}

			.header ul {
				display: none;
			}

			.header img {
				position: absolute;
				top: 39.5px;
				right: 10%;
				width: 30px;
				height: 21px;
				display: block;
			}

			.content .works {
				width: 290px;
			}

			.content .works .work {
				width: 290px;
				height: 290px;
			}

			.work .work-name {
				line-height: 290px;
				font-size: 36px;
			}

			.work .work-year {
				line-height: 380px;
			}

			.footer {
				display: block;
			}

			.footer p {
				padding-left: 0;
				line-height: 60px;
			}

			.footer .social-media {
				margin: 0 auto;
			}
		}

	</style>

	<script type="text/javascript">
		function backtotop() {
			window.scroll(0, 0)
			}

		window.onscroll = function(){
			if(window.scrollY > 1200) {
				document.getElementsByClassName('back-to-top')[0].className += ' back-to-top-show';
			} else {
				document.getElementsByClassName('back-to-top')[0].className = 'back-to-top';
			}
		}
	</script>
